# .github/workflows/agency-buyers.yml
name: Apex Agency Buyer Hunter | By Idincode

on:
  workflow_dispatch:  # Manual trigger dari GitHub Actions UI
  schedule:
    # Setiap Rabu jam 02:00 UTC (= 09:00 WIB)
    - cron: '0 2 * * 3'

jobs:
  agency-buyers:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p output

      - name: Run agency buyer hunter pipeline
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          IDINCODE_API: ${{ secrets.IDINCODE_API }}
        run: python find_agency_buyers.py

      - name: Upload CSV artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agency-buyers-csv-${{ github.run_number }}
          path: output/*.csv
          retention-days: 30

      - name: Commit CSV results (optional)
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.csv || true
          git diff --staged --quiet || git commit -m "chore: weekly agency buyer hunt $(date +%Y-%m-%d)"
          git push
