name: Apex Business Intelligence | By Idincode

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * 1'

permissions:
  contents: read

jobs:
  run-business-intel:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run business intelligence pipeline
        run: python run_business_intel.py

      - name: List output files
        if: always()
        run: |
          echo "=== Output files ==="
          ls -la artifacts/business_intel/ || echo "No outputs"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-intel-csv
          path: artifacts/business_intel/
          if-no-files-found: warn
          retention-days: 30
