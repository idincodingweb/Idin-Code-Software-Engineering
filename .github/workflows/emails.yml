# .github/workflows/emails.yml
name: Apex Email Generator | By Idincode

# Manual only — butuh CSV hasil leads/buyers/agency-buyers yang sudah
# ter-commit ke repo (lewat workflow lain). User trigger via "Run workflow".
on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Email source (auto | leads | buyers | agency_pitch)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - leads
          - buyers
          - agency_pitch
      limit:
        description: 'Max emails to generate (kosong = no cap)'
        required: false
        default: ''
        type: string

jobs:
  emails:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p output/emails

      - name: Generate emails
        env:
          IDINCODE_API: ${{ secrets.IDINCODE_API }}
          SOURCE: ${{ github.event.inputs.source }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          ARGS=""
          if [ -n "$SOURCE" ] && [ "$SOURCE" != "auto" ]; then
            ARGS="$ARGS --source $SOURCE"
          fi
          if [ -n "$LIMIT" ]; then
            ARGS="$ARGS --limit $LIMIT"
          fi
          echo "Running: python generate_emails.py $ARGS"
          python generate_emails.py $ARGS

      - name: Upload email artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: emails-${{ github.run_number }}
          path: output/emails/**
          retention-days: 30

      - name: Commit email results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/emails || true
          git diff --staged --quiet || git commit -m "chore: generate emails $(date +%Y-%m-%d)"
          git push || true
