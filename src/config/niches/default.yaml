metadata:
  industry_label: "brand growth-stage Indonesia"
  typical_ticket: "Rp 5juta - Rp 50juta per project, atau retainer bulanan"
  pain_point: "atribusi marketing, friksi konversi, dan revenue capture yang bocor"

analyst:
  focus: >
    Fokus pada peluang bisnis nyata yang terlihat dari setup tracking, performa website,
    kontaktabilitas, dan sinyal kematangan bisnis. Prioritaskan masalah yang bisa
    diperbaiki cepat oleh tim internal brand atau partner technical mereka.
  mature_business_note: >
    Kalau brand sudah terlihat operasional matang (multi-lokasi, social aktif, tech stack lengkap),
    kurangi urgensi dan sebut peluang terbatas — kecuali ada gap scale, retensi, atau atribusi yang jelas.

  fallback_reasons_rules:
    - conditions:
        - field: pixel_confidence
          op: eq
          value: "low"
      template: "Visibility tracking masih low-confidence karena scan HTML statis bisa miss tag yang di-load via JavaScript — perlu validasi lanjutan sebelum klaim definitive."

    - conditions:
        - field: missing_tracking_count
          op: gte
          value: 3
        - field: pixel_confidence
          op: in
          value: ["high", "medium"]
      template: "Terdeteksi {missing_tracking_count} sinyal tracking utama hilang ({missing_tracking_items}) — gap atribusi & retargeting yang signifikan."

    - conditions:
        - field: missing_tracking_count
          op: gte
          value: 1
        - field: missing_tracking_count
          op: lt
          value: 3
        - field: pixel_confidence
          op: in
          value: ["high", "medium"]
      template: "Tracking belum lengkap — {missing_tracking_items} tidak terdeteksi di HTML, stack atribusi masih partial."

    - conditions:
        - field: pagespeed_score
          op: lt
          value: 50
      template: "PageSpeed mobile {pagespeed_score}/100 — risiko bounce tinggi pada traffic paid dan organik."

    - conditions:
        - field: pagespeed_score
          op: gte
          value: 50
        - field: pagespeed_score
          op: lt
          value: 70
      template: "PageSpeed mobile {pagespeed_score}/100 — masih ada ruang signifikan untuk uplift konversi via optimasi performa."

    - conditions:
        - field: response_ms
          op: gt
          value: 3000
      template: "Server response time {response_ms}ms — indikasi drag infrastruktur atau hosting yang menahan konversi."

    - conditions:
        - field: platform
          op: in
          value: ["wordpress", "woocommerce"]
      template: "Stack WordPress/WooCommerce — relatif mudah di-onboard untuk fix tracking dan speed."

    - conditions:
        - field: firmographics_confidence
          op: eq
          value: "low"
      template: "Sinyal ukuran perusahaan & revenue diestimasi dari data publik dan harus diperlakukan sebagai indikatif, bukan definitive."

  fallback_outreach_rules:
    - priority: 1
      conditions:
        - field: missing_tracking_count
          op: gte
          value: 2
        - field: pixel_confidence
          op: in
          value: ["high", "medium"]
      template: "Subject: Saya menemukan {missing_tracking_count} gap tracking di website {brand} — bisa diskusi singkat?"

    - priority: 2
      conditions:
        - field: pagespeed_score
          op: lt
          value: 50
      template: "Subject: Website {brand} loading di {pagespeed_score}/100 mobile — ini estimasi cost-nya"

    - priority: 3
      conditions:
        - field: response_ms
          op: gt
          value: 3000
      template: "Subject: Catatan singkat soal speed website {brand} (kemungkinan ada konversi yang hilang)"

    - priority: 4
      conditions:
        - field: pixel_confidence
          op: eq
          value: "low"
      template: "Subject: Saya temukan beberapa blind spot funnel di website {brand} — worth divalidasi?"

quality_score:
  base: 55
  rules:
    - conditions:
        - field: weighted_missing_tracking_count
          op: gte
          value: 3
      points: 12

    - conditions:
        - field: weighted_missing_tracking_count
          op: eq
          value: 0
      points: -10

    - conditions:
        - field: emails_found_count
          op: gte
          value: 1
      points: 8

    - conditions:
        - field: mx_valid
          op: eq
          value: true
      points: 6

    - conditions:
        - field: running_meta_ads
          op: eq
          value: true
      points: 8

    - conditions:
        - field: revenue_tier
          op: in
          value: ["small", "mid"]
      points: 5

    - conditions:
        - field: revenue_tier
          op: in
          value: ["large", "enterprise"]
      points: 2

    - conditions:
        - field: revenue_tier
          op: eq
          value: "micro"
      points: -3

    - conditions:
        - field: social_profiles_count
          op: gte
          value: 3
      points: 4

    - conditions:
        - field: bi_score
          op: gte
          value: 60
      points: 3

    - conditions:
        - field: bi_score
          op: gte
          value: 30
      points: 1

    - conditions:
        - field: tier
          op: eq
          value: 1
      points: 6

    - conditions:
        - field: tier
          op: eq
          value: 2
      points: 3

qualifier:
  weights:
    pixels: 0.40
    pagespeed: 0.30
    lcp: 0.15
    platform: 0.15
  response_penalty_threshold_ms: 2000
  response_penalty_factor: 0.15
