metadata:
  industry_label: "brand fashion & apparel Indonesia"
  typical_ticket: "Rp 10juta - Rp 100juta per project audit, atau retainer Rp 5-15juta/bulan"
  pain_point: "atribusi cross-channel (Shopee/TikTok Shop/website), retargeting yang bocor, dan konversi mobile yang underoptimized"

analyst:
  focus: >
    Brand fashion Indonesia umumnya jual via Shopee, TikTok Shop, Tokopedia, dan website sendiri.
    Fokus ke: konsolidasi tracking cross-channel, optimasi mobile checkout, retargeting Meta/TikTok,
    dan integrasi CRM untuk repeat-buyer. Mayoritas brand fashion Indonesia punya Meta & TikTok Pixel,
    tapi sering tracking-nya inkonsisten antara website dan marketplace.
  mature_business_note: >
    Brand tier 1 (Erigo, 3Second, CottonInk, dst) sudah pasti punya tim marketing besar dan budget iklan
    miliaran. Jangan undersell. Fokus rekomendasi ke: optimisasi attribution stack, advanced segmentation,
    dan retention/LTV play. Brand tier 2-3 lebih cocok untuk acquisition & tracking foundational.

  fallback_reasons_rules:
    - conditions:
        - field: tier
          op: eq
          value: 1
      template: "Brand fashion tier 1 nasional — pasti aktif iklan Meta/TikTok dengan budget besar. Peluang utama: konsolidasi attribution cross-channel (website + Shopee + TikTok Shop) dan retention play untuk LTV uplift."

    - conditions:
        - field: tier
          op: eq
          value: 2
      template: "Brand fashion tier 2 yang sedang scaling — momentum bagus untuk benerin foundational tracking, mobile UX, dan kickstart retargeting yang sistematis."

    - conditions:
        - field: pixel_confidence
          op: eq
          value: "low"
      template: "Tracking belum terverifikasi penuh — scan HTML statis bisa miss pixel yang di-load via GTM atau Shopify async script. Untuk brand fashion sekelas ini, hampir pasti pixel-nya ada tapi perlu konfirmasi via browser DevTools."

    - conditions:
        - field: missing_tracking_count
          op: gte
          value: 3
        - field: pixel_confidence
          op: in
          value: ["high", "medium"]
      template: "Stack tracking hilang {missing_tracking_count} sinyal ({missing_tracking_items}) — untuk brand fashion yang aktif iklan, ini bocor budget Meta/TikTok ads yang serius karena retargeting & lookalike audience tidak optimal."

    - conditions:
        - field: pagespeed_score
          op: lt
          value: 40
      template: "PageSpeed mobile {pagespeed_score}/100 sangat rendah — fashion shopper Indonesia 90%+ via mobile, bounce rate pasti tinggi dan cost-per-conversion meledak."

    - conditions:
        - field: pagespeed_score
          op: gte
          value: 40
        - field: pagespeed_score
          op: lt
          value: 70
      template: "PageSpeed mobile {pagespeed_score}/100 — masih ada uplift konversi 15-30% potential dari optimasi LCP dan image lazy-load."

    - conditions:
        - field: platform
          op: eq
          value: "shopify"
      template: "Stack Shopify — tracking implementation relatif standar, tapi sering ada custom theme yang break event tracking di checkout funnel."

    - conditions:
        - field: platform
          op: eq
          value: "woocommerce"
      template: "Stack WooCommerce/WordPress — fleksibel tapi rentan plugin conflict yang break pixel firing di add-to-cart dan purchase event."

    - conditions:
        - field: social_profiles_count
          op: gte
          value: 4
      template: "Social presence luas ({social_profiles_count} platform) — sinyal brand awareness kuat, tapi attribution cross-channel ke website biasanya masih bocor."

    - conditions:
        - field: firmographics_confidence
          op: eq
          value: "low"
      template: "Estimasi ukuran perusahaan dari scan publik kemungkinan understated — brand fashion established Indonesia biasanya punya tim 50-500 orang termasuk warehouse & toko offline."

  fallback_outreach_rules:
    - priority: 1
      conditions:
        - field: tier
          op: eq
          value: 1
        - field: pagespeed_score
          op: lt
          value: 50
      template: "Subject: Audit singkat: website {brand} loading {pagespeed_score}/100 mobile — estimasi impact ke konversi paid ads"

    - priority: 2
      conditions:
        - field: tier
          op: eq
          value: 1
      template: "Subject: Insight singkat soal attribution cross-channel {brand} (Shopee + TikTok Shop + website)"

    - priority: 3
      conditions:
        - field: missing_tracking_count
          op: gte
          value: 2
        - field: pixel_confidence
          op: in
          value: ["high", "medium"]
      template: "Subject: {brand} — saya temukan beberapa gap tracking yang impact retargeting Meta/TikTok"

    - priority: 4
      conditions:
        - field: pagespeed_score
          op: lt
          value: 50
      template: "Subject: Website {brand} loading {pagespeed_score}/100 mobile — ini perkiraan cost-nya untuk shopper Indonesia"

    - priority: 5
      conditions:
        - field: pixel_confidence
          op: eq
          value: "low"
      template: "Subject: Beberapa observasi tracking & UX website {brand} — worth validasi sebelum next campaign?"

quality_score:
  base: 60
  rules:
    - conditions:
        - field: tier
          op: eq
          value: 1
      points: 10

    - conditions:
        - field: tier
          op: eq
          value: 2
      points: 6

    - conditions:
        - field: tier
          op: eq
          value: 3
      points: 2

    - conditions:
        - field: weighted_missing_tracking_count
          op: gte
          value: 3
      points: 10

    - conditions:
        - field: weighted_missing_tracking_count
          op: eq
          value: 0
      points: -8

    - conditions:
        - field: pagespeed_score
          op: lt
          value: 40
      points: 10

    - conditions:
        - field: pagespeed_score
          op: gte
          value: 40
        - field: pagespeed_score
          op: lt
          value: 70
      points: 5

    - conditions:
        - field: emails_found_count
          op: gte
          value: 1
      points: 6

    - conditions:
        - field: mx_valid
          op: eq
          value: true
      points: 4

    - conditions:
        - field: platform
          op: in
          value: ["shopify", "woocommerce"]
      points: 4

    - conditions:
        - field: social_profiles_count
          op: gte
          value: 4
      points: 5

    - conditions:
        - field: social_profiles_count
          op: gte
          value: 2
      points: 2

    - conditions:
        - field: bi_score
          op: gte
          value: 30
      points: 2

qualifier:
  weights:
    pixels: 0.35
    pagespeed: 0.35
    lcp: 0.15
    platform: 0.15
  response_penalty_threshold_ms: 2000
  response_penalty_factor: 0.15
